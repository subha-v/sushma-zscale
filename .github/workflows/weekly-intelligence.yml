name: Intelligence Pipeline

on:
  schedule:
    - cron: '30 6 * * 1,4'  # Monday & Thursday at 6:30 AM UTC
  workflow_dispatch:         # Manual trigger

jobs:
  ingest-and-enrich:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Ingest RSS feeds
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python scripts/intelligence/rss_ingest.py

      # Enrichment is done on-demand via the AI agent chat panel
      # To run manually: python scripts/intelligence/enrich_items.py --limit 10
      # Requires ANTHROPIC_API_KEY
