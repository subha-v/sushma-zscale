<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Login to the zScale Market Intelligence Platform for Texas Economic Development.">
    <title>Login | zScale - Texas Market Intelligence Platform</title>

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="logo.svg">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Styles -->
    <link rel="stylesheet" href="styles.css?v=2">

    <style>
        .login-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            background: var(--bg-primary);
        }

        .login-container {
            width: 100%;
            max-width: 440px;
        }

        .login-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .login-logo {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 24px;
            text-decoration: none;
        }

        .login-logo-icon {
            width: 48px;
            height: 48px;
            background: var(--accent-teal);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 20px rgba(1, 249, 198, 0.3);
        }

        .login-logo-icon span {
            font-size: 24px;
            font-weight: 700;
            color: var(--bg-primary);
        }

        .login-logo-text {
            font-size: 28px;
            font-weight: 700;
            color: var(--text-primary);
            transition: color var(--transition-fast);
        }

        .login-logo:hover .login-logo-text {
            color: var(--accent-teal);
        }

        .login-title {
            font-size: var(--text-2xl);
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        .login-subtitle {
            font-size: var(--text-base);
            color: var(--text-secondary);
        }

        .login-card {
            background: var(--bg-surface);
            border: 1px solid var(--border-dark);
            border-radius: 16px;
            padding: 32px;
        }

        .login-form {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .login-field {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .login-label {
            font-size: var(--text-sm);
            font-weight: 500;
            color: var(--text-secondary);
        }

        .login-input {
            width: 100%;
            padding: 14px 16px;
            font-size: var(--text-base);
            font-family: inherit;
            color: var(--text-primary);
            background: var(--bg-primary);
            border: 1px solid var(--border-dark);
            border-radius: 12px;
            outline: none;
            transition: all var(--transition-fast);
            box-sizing: border-box;
        }

        .login-input::placeholder {
            color: var(--text-tertiary);
        }

        .login-input:focus {
            border-color: var(--accent-teal);
            box-shadow: 0 0 0 3px rgba(1, 249, 198, 0.1);
        }

        .login-btn {
            width: 100%;
            padding: 14px 24px;
            font-size: var(--text-base);
            font-weight: 600;
            font-family: inherit;
            color: var(--bg-primary);
            background: var(--accent-teal);
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all var(--transition-fast);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .login-btn:hover {
            background: var(--accent-teal-hover);
            transform: translateY(-2px);
            box-shadow: 0 0 20px rgba(1, 249, 198, 0.3);
        }

        .login-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .login-error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 12px;
            padding: 12px 16px;
            text-align: center;
            display: none;
        }

        .login-error.visible {
            display: block;
        }

        .login-error p {
            color: #f87171;
            font-size: var(--text-sm);
            margin: 0;
        }

        .login-spinner {
            width: 20px;
            height: 20px;
            border: 2px solid var(--bg-primary);
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            display: none;
        }

        .login-btn.loading .login-spinner {
            display: block;
        }

        .login-btn.loading .login-btn-text {
            display: none;
        }

        .login-btn.loading .login-btn-loading {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .login-btn-loading {
            display: none;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .login-footer {
            margin-top: 32px;
            text-align: center;
        }

        .login-footer a {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: var(--text-sm);
            color: var(--text-secondary);
            text-decoration: none;
            transition: color var(--transition-fast);
        }

        .login-footer a:hover {
            color: var(--accent-teal);
        }

        .login-request {
            margin-top: 24px;
            text-align: center;
        }

        .login-request p {
            font-size: var(--text-sm);
            color: var(--text-tertiary);
            margin: 0;
        }

        .login-request a {
            color: var(--accent-teal);
            text-decoration: none;
            transition: color var(--transition-fast);
        }

        .login-request a:hover {
            color: var(--accent-teal-hover);
        }
    </style>
</head>
<body>
    <div class="login-page">
        <div class="login-container">
            <!-- Logo & Header -->
            <div class="login-header">
                <a href="index.html" class="login-logo">
                    <div class="login-logo-icon">
                        <span>Z</span>
                    </div>
                    <span class="login-logo-text">zScale Capital</span>
                </a>
                <h1 class="login-title">Platform Access</h1>
                <p class="login-subtitle">Sign in to access the intelligence dashboards</p>
            </div>

            <!-- Login Form -->
            <div class="login-card">
                <form id="login-form" class="login-form" onsubmit="return handleLogin(event)">
                    <!-- Error Message -->
                    <div id="login-error" class="login-error">
                        <p>Invalid username or password</p>
                    </div>

                    <!-- Username -->
                    <div class="login-field">
                        <label for="username" class="login-label">Username</label>
                        <input
                            id="username"
                            type="text"
                            class="login-input"
                            placeholder="Enter username"
                            required
                            autocomplete="username"
                        >
                    </div>

                    <!-- Password -->
                    <div class="login-field">
                        <label for="password" class="login-label">Password</label>
                        <input
                            id="password"
                            type="password"
                            class="login-input"
                            placeholder="Enter password"
                            required
                            autocomplete="current-password"
                        >
                    </div>

                    <!-- Submit -->
                    <button type="submit" id="login-btn" class="login-btn">
                        <span class="login-btn-text">Sign In</span>
                        <span class="login-btn-loading">
                            <div class="login-spinner"></div>
                            <span>Signing in...</span>
                        </span>
                    </button>
                </form>
            </div>

            <!-- Footer -->
            <div class="login-footer">
                <a href="index.html">
                    <span>←</span>
                    <span>Back to Homepage</span>
                </a>
            </div>

            <!-- Request Access -->
            <div class="login-request">
                <p>Need access? <a href="demo.html">Request a demo</a></p>
            </div>
        </div>
    </div>

    <script>
        // Demo credentials
        const DEMO_USERNAME = 'demo';
        const DEMO_PASSWORD = 'zscale';

        function handleLogin(e) {
            e.preventDefault();

            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorEl = document.getElementById('login-error');
            const btnEl = document.getElementById('login-btn');

            // Hide previous error
            errorEl.classList.remove('visible');

            // Show loading state
            btnEl.classList.add('loading');
            btnEl.disabled = true;

            // Simulate brief loading
            setTimeout(function() {
                // Check credentials
                const isValid =
                    username.toLowerCase() === DEMO_USERNAME.toLowerCase() &&
                    password === DEMO_PASSWORD;

                if (isValid) {
                    // Store auth in sessionStorage
                    sessionStorage.setItem('zscale_authenticated', 'true');

                    // Redirect to the React app demo-login page
                    // In production, this would be the same domain
                    window.location.href = '/demo-login';
                } else {
                    // Show error
                    errorEl.classList.add('visible');
                    btnEl.classList.remove('loading');
                    btnEl.disabled = false;
                }
            }, 500);

            return false;
        }

        // If already authenticated, redirect to demo-login
        if (sessionStorage.getItem('zscale_authenticated') === 'true') {
            window.location.href = '/demo-login';
        }
    </script>
</body>
</html>
